<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delay Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0b0b0f;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
    }

    .tools{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      width:90%;
      max-width:500px;
    }

    @media(max-width:500px){
      .tools{grid-template-columns:1fr;}
    }

    .tool{
      text-decoration:none;
      border-radius:20px;
      padding:24px;
      background:#1c1c24;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      transition:.2s;
    }

    .tool:hover{
      transform:translateY(-4px);
      background:#2a2a36;
    }

    .title{
      font-size:20px;
      font-weight:bold;
    }

    .desc{
      font-size:12px;
      opacity:.6;
      margin-top:8px;
    }

    .arrow{
      margin-top:20px;
      align-self:flex-end;
      opacity:.5;
    }
  </style>
</head>

<body>

<div class="tools">

  <a href="ahm_advisor_mobile.html" class="tool">
    <div>
      <div class="title">Advisor</div>
      <div class="desc">Select scenario and get delay code</div>
    </div>
    <div class="arrow">→</div>
  </a>

  <a href="delay_insights_fin.html" class="tool">
    <div>
      <div class="title">Insights</div>
      <div class="desc">View delay trends and analysis</div>
    </div>
    <div class="arrow">→</div>
  </a>

</div>

</body>
</html>
